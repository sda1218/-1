spring:
  application:
    name: drone-management-system
  profiles:
    active: ${ACTIVE_PROFILE:dev}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.example.drone: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
